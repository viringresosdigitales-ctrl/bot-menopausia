let estado = {

  sintoma: null,
  pasoInicio: 0,
  pasoProtocolo: 0,
  respuestas: {}
};

function reiniciar() {
  estado = { fase: 'selector', sintoma: null, pasoInicio: 0, pasoProtocolo: 0, respuestas: {} };
  render(true);
}

// ═══════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ═══════════════════════════════════════════════════
function render(scrollTop = false) {
  const app = document.getElementById('app');
  if (estado.fase === 'selector') app.innerHTML = renderSelector();
  else if (estado.fase === 'inicio') app.innerHTML = renderInicio();
  else if (estado.fase === 'protocolo') app.innerHTML = renderProtocolo();
  else if (estado.fase === 'completado') app.innerHTML = renderCompletado();
  if (scrollTop) window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════
//  FASE 1: SELECTOR DE SÍNTOMA
// ═══════════════════════════════════════════════════
function renderSelector() {
  const cards = Object.entries(SINTOMAS).map(([key, s]) => `
    <button class="card-sintoma" onclick="seleccionarSintoma('${key}')">
      <span class="icono">${s.icono}</span>
      <span class="nombre">${s.nombre}</span>
      <span class="desc">${s.desc}</span>
    </button>
  `).join('');

  return `
    <div class="selector-wrap">
      <h1 class="titulo-seccion">¿Con qué síntoma vas a trabajar hoy?</h1>
      <p class="subtitulo">Selecciona el síntoma prioritario para esta sesión</p>
      <div class="grid-sintomas">${cards}</div>
      <div class="nota-pendiente">
        ⚠️ <span>El <strong>Módulo 6.1</strong> (Salud sexual y vaginal) está pendiente de recibir. Se añadirá cuando esté disponible.</span>
      </div>
    </div>
  `;
}

function seleccionarSintoma(key) {
  estado.sintoma = key;
  estado.fase = 'inicio';
  estado.pasoInicio = 0;
  render();
}

        <div class="barra"><div class="barra-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="paso-wrap">
        <div class="paso-numero">Paso ${paso.numero}</div>
        <div class="paso-titulo">${paso.titulo}</div>

        <div class="bloque">
          <div class="bloque-label">Pregunta</div>
          <div class="pregunta-texto">${paso.pregunta}</div>
        </div>

        <div class="botones-respuesta">
          <button class="btn-no ${resp === 'no' ? 'activo' : ''}" onclick="responderInicio('no')">
            ✓ SÍ — está bien
          </button>
          <button class="btn-si ${resp === 'si' ? 'activo' : ''}" onclick="responderInicio('si')">
            NO — aplicar decreto
          </button>
        </div>

        <div class="decreto-contenedor ${resp === 'si' ? 'visible' : ''}" id="decreto-inicio">
          <div class="decreto-label">Decreto</div>
          <div class="decreto-texto">"${paso.decreto}"</div>
        </div>

        <button class="btn-siguiente" onclick="siguienteInicio()" ${!resp ? 'disabled' : ''}>
          ${estado.pasoInicio < total - 1 ? 'Siguiente →' : 'Iniciar protocolo →'}
        </button>
      </div>
    </div>
  `;
}

function responderInicio(resp) {
  estado.respuestas[`inicio_${estado.pasoInicio}`] = resp;
  render(false);
}

function siguienteInicio() {
  if (estado.pasoInicio < PROTOCOLO_INICIO.length - 1) {
    estado.pasoInicio++;
    render(true);
  } else {
    estado.fase = 'protocolo';
    estado.pasoProtocolo = 0;
    render(true);
  }
}

// ═══════════════════════════════════════════════════
//  FASE 3: PROTOCOLO DEL SÍNTOMA
// ═══════════════════════════════════════════════════
function renderProtocolo() {
  const sintoma = SINTOMAS[estado.sintoma];
  const pasos = sintoma.pasos;
  const paso = pasos[estado.pasoProtocolo];
  const total = pasos.length;
  const pct = Math.round(((estado.pasoProtocolo + 1) / (total + 1)) * 100);
  const esUltimo = estado.pasoProtocolo === total - 1;
  const resp = estado.respuestas[`proto_${estado.pasoProtocolo}`];

  // Detectar cambio de bloque para mostrar separador
  const bloqueActual = paso.bloque;
  const bloquePrev = estado.pasoProtocolo > 0 ? pasos[estado.pasoProtocolo - 1].bloque : null;
  const nuevoBloqueTag = bloqueActual !== bloquePrev ? `<div class="tag-bloque">${bloqueActual}</div>` : '';

  return `
    <div class="protocolo-wrap">
      <div class="nav-protocolo">
        <button class="btn-volver" onclick="volverAlSelector()">← Síntomas</button>
        <span class="sintoma-badge">${sintoma.icono} ${sintoma.nombre}</span>
      </div>

      <div class="barra-progreso-wrap">
        <div class="progreso-label">
          <span>Punto ${estado.pasoProtocolo + 1} de ${total}</span>
          <span>${pct}%</span>
        </div>
        <div class="barra"><div class="barra-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="paso-wrap">
        ${nuevoBloqueTag}
        <div class="paso-numero">Punto ${estado.pasoProtocolo + 1}</div>
        <div class="paso-titulo">${paso.titulo}</div>

        <div class="bloque">
          <div class="bloque-label">Pregunta Origen</div>
          <div class="pregunta-texto">${paso.pregunta}</div>
        </div>

        <div class="botones-respuesta">
          <button class="btn-no ${resp === 'no' ? 'activo' : ''}" onclick="responderProtocolo('no')">
            ✓ SÍ — está bien
          </button>
          <button class="btn-si ${resp === 'si' ? 'activo' : ''}" onclick="responderProtocolo('si')">
            NO — aplicar decreto
          </button>
        </div>

        <div class="decreto-contenedor ${resp === 'si' ? 'visible' : ''}">
          <div class="decreto-label">Decreto Origen</div>
          <div class="decreto-texto">"${paso.decreto}"</div>
        </div>

        <button class="btn-siguiente" onclick="siguienteProtocolo()" ${!resp ? 'disabled' : ''}>
          ${esUltimo ? 'Decreto general de cierre →' : 'Siguiente →'}
        </button>
      </div>
    </div>
  `;
}

function responderProtocolo(resp) {
  estado.respuestas[`proto_${estado.pasoProtocolo}`] = resp;
  render(false);
}

function siguienteProtocolo() {
  const total = SINTOMAS[estado.sintoma].pasos.length;
  if (estado.pasoProtocolo < total - 1) {
    estado.pasoProtocolo++;
    render(true);
  } else {
    estado.fase = 'completado';
    render(true);
  }
}

function volverAlSelector() {
  estado = { fase: 'selector', sintoma: null, pasoInicio: 0, pasoProtocolo: 0, respuestas: {} };
  render(true);
}

// ═══════════════════════════════════════════════════
//  FASE 4: COMPLETADO + DECRETO FINAL
// ═══════════════════════════════════════════════════
function renderCompletado() {
  const sintoma = SINTOMAS[estado.sintoma];
  const totalSi = Object.values(estado.respuestas).filter(r => r === 'si').length;

  return `
    <div class="completado">
      <div class="icono">✨</div>
      <h2>Protocolo completado</h2>
      <p>${sintoma.icono} ${sintoma.nombre} · ${totalSi} puntos corregidos</p>

      <div class="decreto-general">
        <div class="titulo">Decreto general de corrección directa</div>
        <div class="texto">"${sintoma.decretoFinal}"</div>
      </div>

      <br>
      <button class="btn-nuevo-sintoma" onclick="reiniciar()">← Trabajar otro síntoma</button>
    </div>
  `;
}

// INICIO
render();
</script>


</body></html>
